<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Přěpojovaní...</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#0b0f14;
    color:white;
    font-family:system-ui;
}

.box {
    text-align:center;
    padding:20px;
}

.loader {
    width:50px;
    height:50px;
    border:5px solid #1f2937;
    border-top:5px solid #3b82f6;
    border-radius:50%;
    animation: spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin {
    0% {transform:rotate(0deg);}
    100% {transform:rotate(360deg);}
}

.text {
    font-size:18px;
    opacity:0.9;
}
</style>
</head>

<body>

<div class="box">
    <div class="loader"></div>
    <div class="text">🔗 Probíhá prěpojovaní na PTV Net...</div>
</div>

<script>
setTimeout(() => {
    window.location.href = "https://ptv-central-8a43ed.webnode.cz;
}, 5000);
</script>

</body>
</html>
